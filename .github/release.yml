# GitHub Release Notes Automatic Categorization
# This file controls how auto-generated release notes group pull requests.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
      - wontfix
      - invalid

  categories:
    - title: "💥 Breaking Changes"
      labels:
        - breaking-change
        - breaking

    - title: "🛡️ New Detection Rules"
      labels:
        - detection
        - security
        - new-rule

    - title: "⚡ Performance"
      labels:
        - performance
        - perf
        - optimization

    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
        - bugfix

    - title: "📖 Documentation"
      labels:
        - documentation
        - docs

    - title: "🔧 Configuration"
      labels:
        - config
        - tuning

    - title: "🏗️ Internal / Refactor"
      labels:
        - chore
        - refactor
        - cleanup
        - internal

    - title: "⬆️ Dependency Updates"
      labels:
        - dependencies
        - deps
